version: "3.8"

services:
  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - content-service
      - review-service

  content-service:
    build: ./content-service
    ports:
      - "4001:4001"
    depends_on:
      - redis

  review-service:
    build: ./review-service
    ports:
      - "4002:4002"
    depends_on:
      - db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reviews
    ports:
      - "5432:5432"